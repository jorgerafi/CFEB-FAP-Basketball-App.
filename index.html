<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFEB-FAP | Protocolo de Investigación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tap-active:active { transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="app" class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-2xl relative border-x border-slate-200">
        <!-- Header con Estado de Nube -->
        <header class="p-5 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-lg z-50">
            <div class="flex items-center gap-3" id="logo-trigger">
                <div class="bg-blue-900 p-2.5 rounded-2xl shadow-lg shadow-blue-100">
                    <i data-lucide="basketball" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-base leading-none uppercase tracking-tight text-blue-950">CFEB-FAP</h1>
                    <p class="text-[8px] text-blue-600 font-black uppercase tracking-widest mt-1 italic">Investigación</p>
                </div>
            </div>
            <div id="cloud-status" class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-slate-100 bg-slate-50 transition-all duration-500">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                <span id="status-text" class="text-[9px] font-black uppercase tracking-wider text-slate-400 italic">Buscando...</span>
            </div>
        </header>

        <!-- Contenedor Principal -->
        <main id="view-container" class="flex-grow p-6 flex flex-col overflow-y-auto no-scrollbar"></main>

        <!-- Footer Académico -->
        <footer class="p-6 text-center border-t border-slate-50 bg-slate-50/40">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] leading-relaxed">
                Jorge Maroto Cuadrado · CB Estudiantes<br>
                "El fallo es información, no derrota"
            </p>
        </footer>
    </div>

    <script type="module">
        // Importaciones necesarias de Firebase CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- SISTEMA DE DETECCIÓN DE CONFIGURACIÓN (Vercel Fix) ---
        let db = null;
        let auth = null;
        let currentUser = null;
        
        // Intentamos obtener las variables de múltiples fuentes
        const getEnv = (key) => {
            return window[key] || (typeof process !== 'undefined' ? process.env[key] : null);
        };

        async function connectCloud() {
            const configValue = getEnv('__firebase_config');
            const appId = getEnv('__app_id') || 'fap-estudiantes-anon';

            if (!configValue) {
                updateBadge("ERROR: No Config", "bg-red-500");
                console.error("No se detectó la variable __firebase_config en Vercel.");
                return;
            }

            try {
                const config = typeof configValue === 'string' ? JSON.parse(configValue) : configValue;
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        updateBadge("Cloud Online", "bg-green-500");
                    }
                });
            } catch (err) {
                updateBadge("ERROR Conexión", "bg-orange-500");
                console.error("Fallo crítico al conectar con Firebase:", err);
            }
        }

        function updateBadge(text, colorClass) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            dot.className = `w-2 h-2 rounded-full ${colorClass} ${colorClass.includes('green') ? 'animate-pulse' : ''}`;
            txt.innerText = text;
            txt.className = `text-[9px] font-black uppercase tracking-wider ${colorClass.replace('bg-', 'text-')}`;
        }

        // --- DEFINICIÓN DE ÍTEMS (Cuestionario Científico) ---
        const ITEMS = [
            { id: 1, text: "Antes del partido me siento preparado emocionalmente para competir", cat: "PREP" },
            { id: 2, text: "Antes de jugar pienso mucho en no cometer errores", cat: "PREP", inv: true },
            { id: 3, text: "Me siento nervioso o tenso antes de empezar el partido", cat: "PREP", inv: true },
            { id: 4, text: "Me siento con confianza para seguir jugando aunque falle", cat: "PREP" },
            { id: 5, text: "Me siento disponible para asumir responsabilidades en el juego", cat: "PREP" },
            { id: 6, text: "Cuando cometo un error, me bloqueo emocionalmente", cat: "CCR1", inv: true },
            { id: 7, text: "Después de fallar, tardo en volver a concentrarme", cat: "CCR1", inv: true },
            { id: 8, text: "Evito participar en la siguiente jugada tras un error", cat: "CCR1", inv: true },
            { id: 9, text: "Soy capaz de centrarme rápido en la siguiente acción", cat: "CCR2" },
            { id: 10, text: "El error baja mi intensidad defensiva", cat: "CCR1", inv: true },
            { id: 11, text: "Después de fallar, sigo disponible para recibir el balón", cat: "CCR2" },
            { id: 12, text: "Las indicaciones del entrenador me ayudan después de un error", cat: "STAFF" },
            { id: 13, text: "El feedback del entrenador reduce mi malestar cuando fallo", cat: "STAFF" },
            { id: 14, text: "A veces las indicaciones del entrenador me generan más presión", cat: "STAFF", inv: true },
            { id: 15, text: "Me siento apoyado por el entrenador cuando cometo errores", cat: "STAFF" },
            { id: 16, text: "Después del partido sigo dándole vueltas a mis errores", cat: "CCR1", inv: true },
            { id: 17, text: "Me resulta fácil soltar el partido a nivel emocional", cat: "CCR2" },
            { id: 18, text: "Los errores afectan a mi estado de ánimo después del partido", cat: "CCR1", inv: true },
            { id: 19, text: "Soy capaz de aprender de los errores sin machacarme", cat: "CCR2" }
        ];

        let state = { view: 'intro', player: '', current: 0, answers: {} };

        // --- SISTEMA DE NAVEGACIÓN ---
        const render = () => {
            const container = document.getElementById('view-container');
            container.innerHTML = '';

            if (state.view === 'intro') {
                container.innerHTML = `
                    <div class="flex-grow flex flex-col justify-center items-center text-center space-y-12 slide-up pt-10">
                        <div class="space-y-4">
                            <div class="bg-blue-50 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto border border-blue-100 rotate-3 shadow-xl">
                                <i data-lucide="microscope" class="w-10 h-10 text-blue-900 -rotate-3"></i>
                            </div>
                            <h2 class="text-3xl font-black text-slate-900 italic tracking-tighter">PROTOCOLO FAP</h2>
                            <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] px-10">Recogida de Datos Científicos</p>
                        </div>
                        
                        <div class="w-full space-y-6">
                            <div class="text-left space-y-2">
                                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Identificación del Jugador</label>
                                <input type="text" id="input-name" placeholder="Nombre completo o ID" 
                                    class="w-full p-5 rounded-3xl bg-slate-50 border-2 border-transparent focus:border-blue-900 focus:bg-white outline-none font-bold text-center transition-all shadow-inner">
                            </div>
                            <button id="btn-start" class="tap-active w-full bg-blue-950 text-white font-black py-5 rounded-3xl shadow-2xl flex items-center justify-center gap-4 uppercase text-xs tracking-[0.2em] active:bg-blue-700">
                                Iniciar Test <i data-lucide="chevron-right" class="w-5 h-5"></i>
                            </button>
                            <p class="text-[9px] text-slate-300 font-bold uppercase tracking-widest">Tus respuestas serán tratadas de forma confidencial.</p>
                        </div>

                        <button id="btn-admin" class="text-[9px] font-black text-slate-200 uppercase tracking-widest hover:text-blue-900 py-4 mt-auto">
                            Acceso Historial <i data-lucide="key" class="w-3 h-3 inline ml-1"></i>
                        </button>
                    </div>
                `;
                document.getElementById('btn-start').onclick = () => {
                    const name = document.getElementById('input-name').value.trim();
                    if (!name) return;
                    state.player = name; state.view = 'quiz'; render();
                };
                document.getElementById('btn-admin').onclick = () => { state.view = 'admin'; render(); };
            } 
            
            else if (state.view === 'quiz') {
                const item = ITEMS[state.current];
                const progress = (state.current / ITEMS.length) * 100;
                container.innerHTML = `
                    <div class="slide-up">
                        <div class="flex justify-between items-center mb-10">
                            <div class="space-y-1">
                                <span class="text-[10px] font-black text-blue-700 uppercase tracking-widest block">${state.player}</span>
                                <span class="text-[8px] text-slate-300 font-bold uppercase tracking-widest italic">Pregunta ${state.current + 1} de 19</span>
                            </div>
                            <div class="relative flex items-center justify-center">
                                <svg class="w-12 h-12 transform -rotate-90">
                                    <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="transparent" class="text-slate-100" />
                                    <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3" fill="transparent" class="text-blue-900" 
                                        stroke-dasharray="125.6" stroke-dashoffset="${125.6 - (progress/100)*125.6}" />
                                </svg>
                                <span class="absolute text-[9px] font-black text-slate-400">${Math.round(progress)}%</span>
                            </div>
                        </div>

                        <div class="min-h-[140px] flex items-center mb-12">
                            <h3 class="text-2xl font-black text-slate-800 leading-tight italic">"${item.text}"</h3>
                        </div>

                        <div class="grid gap-3">
                            ${[
                                {v:0, t:"Nunca / Nada"},
                                {v:1, t:"Rara vez / Poco"},
                                {v:2, t:"A veces / Regular"},
                                {v:3, t:"A menudo / Bastante"},
                                {v:4, t:"Siempre / Mucho"}
                            ].map(opt => `
                                <button onclick="window.saveOption(${opt.v})" class="tap-active w-full p-5 rounded-2xl border-2 border-slate-50 bg-white text-left font-bold flex justify-between items-center hover:border-blue-900 hover:bg-blue-50 transition-all shadow-sm">
                                    <span class="text-slate-600 text-sm font-bold uppercase tracking-wide">${opt.t}</span>
                                    <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-[10px] text-slate-300">${opt.v}</div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            else if (state.view === 'results') {
                const summary = window.calculateResults(state.answers);
                container.innerHTML = `
                    <div class="slide-up space-y-6 pb-10">
                        <div class="bg-blue-950 p-8 rounded-[3rem] text-white shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-8 opacity-10">
                                <i data-lucide="check-circle" class="w-24 h-24"></i>
                            </div>
                            <h4 class="text-blue-400 font-black text-[10px] uppercase tracking-[0.3em] mb-4">Análisis Terminado</h4>
                            <h3 class="text-3xl font-black tracking-tighter mb-8 italic">${state.player}</h3>
                            
                            <div class="space-y-5 pt-8 border-t border-white/10">
                                ${summary.map(s => `
                                    <div class="space-y-1.5">
                                        <div class="flex justify-between items-center text-[9px] font-black uppercase tracking-widest">
                                            <span class="opacity-40">${s.name}</span>
                                            <span class="${s.color}">${s.level} (${s.score})</span>
                                        </div>
                                        <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden shadow-inner">
                                            <div class="h-full ${s.bg} rounded-full" style="width: ${(s.score/4)*100}%"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-white p-6 rounded-3xl border border-slate-100 flex gap-4 shadow-xl">
                            <div class="bg-green-50 p-3 rounded-2xl h-fit border border-green-100 text-green-600">
                                <i data-lucide="cloud-upload" class="w-6 h-6"></i>
                            </div>
                            <div class="space-y-1">
                                <p class="text-[10px] font-black text-slate-800 uppercase tracking-widest">Sincronización Cloud</p>
                                <p class="text-[11px] text-slate-400 font-bold leading-relaxed">Tus respuestas han sido enviadas para el análisis de investigación del CB Estudiantes.</p>
                            </div>
                        </div>

                        <button onclick="location.reload()" class="tap-active w-full bg-slate-900 text-white font-black py-5 rounded-3xl uppercase text-xs tracking-widest shadow-lg">Finalizar Sesión</button>
                    </div>
                `;
            }

            else if (state.view === 'admin') {
                container.innerHTML = `
                    <div class="slide-up flex flex-col h-full space-y-6">
                        <div class="flex justify-between items-center">
                            <h2 class="text-2xl font-black tracking-tight italic">DATA STAFF</h2>
                            <div class="flex gap-2">
                                <button id="btn-csv" class="bg-green-600 text-white p-3 rounded-2xl shadow-lg"><i data-lucide="file-down" class="w-5 h-5"></i></button>
                                <button onclick="window.go('intro')" class="bg-slate-100 text-slate-400 p-3 rounded-2xl"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                        <div id="data-list" class="flex-grow space-y-3 overflow-y-auto no-scrollbar pb-10">
                            <div class="py-20 text-center text-slate-300 italic text-sm font-bold uppercase tracking-widest">Consultando registros...</div>
                        </div>
                    </div>
                `;
                window.loadData();
                document.getElementById('btn-csv').onclick = () => window.exportCSV();
            }

            lucide.createIcons();
        };

        // --- FUNCIONALIDADES AUXILIARES ---
        window.go = (v) => { state.view = v; render(); };
        window.saveOption = async (val) => {
            state.answers[ITEMS[state.current].id] = val;
            if (state.current < ITEMS.length - 1) {
                state.current++; render();
            } else {
                state.view = 'results';
                render();
                // Persistencia automática
                if (db && currentUser) {
                    try {
                        const results = window.calculateResults(state.answers);
                        await addDoc(collection(db, 'artifacts', getEnv('__app_id') || 'fap-est-26', 'public', 'data', 'responses'), {
                            playerName: state.player,
                            timestamp: serverTimestamp(),
                            scores: results,
                            raw: state.answers,
                            uid: currentUser.uid
                        });
                    } catch (e) { console.error("Error al guardar:", e); }
                }
            }
        };

        window.calculateResults = (ans) => {
            const data = {};
            ITEMS.forEach(it => {
                const v = ans[it.id] || 0;
                data[it.id] = it.inv ? (4 - v) : v;
            });
            const cats = [
                {n:"Preparación", ids:[1,2,3,4,5]},
                {n:"CCR1 (Bloqueo)", ids:[6,7,8,10,16,18]},
                {n:"CCR2 (Disponibilidad)", ids:[4,5,9,11,17,19]},
                {n:"Feedback Staff", ids:[12,13,14,15]}
            ];
            return cats.map(c => {
                const avg = c.ids.reduce((a, b) => a + data[b], 0) / c.ids.length;
                let lvl = "Bajo", clr = "text-red-400", bg = "bg-red-500";
                if(avg >= 1.34) { lvl = "Medio"; clr = "text-orange-400"; bg = "bg-orange-500"; }
                if(avg >= 2.67) { lvl = "Alto"; clr = "text-green-400"; bg = "bg-green-500"; }
                return { name: c.n, score: avg.toFixed(2), level: lvl, color: clr, bg: bg };
            });
        };

        window.loadData = async () => {
            if (!db) return;
            const q = query(collection(db, 'artifacts', getEnv('__app_id') || 'fap-est-26', 'public', 'data', 'responses'), orderBy('timestamp', 'desc'));
            const snap = await getDocs(q);
            const list = document.getElementById('data-list');
            list.innerHTML = '';
            if (sn
