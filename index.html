<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFEB-FAP | Recolección de Datos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .tap-active:active { transform: scale(0.97); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div id="app" class="min-h-screen flex flex-col max-w-lg mx-auto bg-white shadow-2xl relative border-x border-slate-100">
        <!-- Header -->
        <header class="p-4 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-50">
            <div class="flex items-center gap-2.5">
                <div class="bg-orange-600 p-2 rounded-xl shadow-lg shadow-orange-100">
                    <i data-lucide="basketball" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-base leading-none uppercase tracking-tight">CFEB-FAP</h1>
                    <p class="text-[8px] text-orange-600 font-black uppercase tracking-widest mt-0.5 italic">Estudiantes</p>
                </div>
            </div>
            <div id="cloud-badge" class="flex items-center gap-1.5 px-3 py-1 rounded-full border border-slate-100 bg-slate-50 transition-all">
                <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-300"></div>
                <span id="status-text" class="text-[8px] font-black uppercase tracking-wider text-slate-400">Offline</span>
            </div>
        </header>

        <!-- Main View Container -->
        <main id="main-view" class="flex-grow p-5 flex flex-col overflow-y-auto no-scrollbar"></main>

        <!-- Footer -->
        <footer class="p-5 text-center border-t border-slate-50 bg-slate-50/30">
            <p class="text-[8px] text-slate-400 font-bold uppercase tracking-[0.2em] leading-relaxed">
                Jorge Maroto Cuadrado · CB Estudiantes<br>
                "El fallo es parte del aprendizaje"
            </p>
        </footer>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Gestión de Configuración (Vercel Compatibility) ---
        let db = null;
        let auth = null;
        let currentUser = null;
        
        // Buscamos la config en el objeto global o window
        const rawConfig = window.__firebase_config || null;
        const appId = window.__app_id || 'cfeb-fap-anon';

        async function initCloud() {
            if (!rawConfig) {
                console.warn("Configuración de Firebase no detectada. Operando en modo local.");
                return;
            }
            try {
                const config = typeof rawConfig === 'string' ? JSON.parse(rawConfig) : rawConfig;
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        const dot = document.getElementById('status-dot');
                        const txt = document.getElementById('status-text');
                        dot.className = "w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_5px_rgba(34,197,94,0.5)]";
                        txt.innerText = "Conectado";
                        txt.className = "text-[8px] font-black uppercase tracking-wider text-green-600";
                    }
                });
            } catch (err) {
                console.error("Error inicializando Firebase:", err);
            }
        }

        // --- Lógica del Test ---
        const ITEMS = [
            { id: 1, text: "Antes del partido me siento preparado emocionalmente para competir", cat: "PREP" },
            { id: 2, text: "Antes de jugar pienso mucho en no cometer errores", cat: "PREP", inv: true },
            { id: 3, text: "Me siento nervioso o tenso antes de empezar el partido", cat: "PREP", inv: true },
            { id: 4, text: "Me siento con confianza para seguir jugando aunque falle", cat: "PREP" },
            { id: 5, text: "Me siento disponible para asumir responsabilidades en el juego", cat: "PREP" },
            { id: 6, text: "Cuando cometo un error, me bloqueo emocionalmente", cat: "CCR1", inv: true },
            { id: 7, text: "Después de fallar, tardo en volver a concentrarme", cat: "CCR1", inv: true },
            { id: 8, text: "Evito participar en la siguiente jugada tras un error", cat: "CCR1", inv: true },
            { id: 9, text: "Soy capaz de centrarme rápido en la siguiente acción", cat: "CCR2" },
            { id: 10, text: "El error baja mi intensidad defensiva", cat: "CCR1", inv: true },
            { id: 11, text: "Después de fallar, sigo disponible para recibir el balón", cat: "CCR2" },
            { id: 12, text: "Las indicaciones del entrenador me ayudan después de un error", cat: "STAFF" },
            { id: 13, text: "El feedback del entrenador reduce mi malestar cuando fallo", cat: "STAFF" },
            { id: 14, text: "A veces las indicaciones del entrenador me generan más presión", cat: "STAFF", inv: true },
            { id: 15, text: "Me siento apoyado por el entrenador cuando cometo errores", cat: "STAFF" },
            { id: 16, text: "Después del partido sigo dándole vueltas a mis errores", cat: "CCR1", inv: true },
            { id: 17, text: "Me resulta fácil soltar el partido a nivel emocional", cat: "CCR2" },
            { id: 18, text: "Los errores afectan a mi estado de ánimo después del partido", cat: "CCR1", inv: true },
            { id: 19, text: "Soy capaz de aprender de los errores sin machacarme", cat: "CCR2" }
        ];

        let state = { view: 'home', name: '', idx: 0, answers: {} };

        const render = () => {
            const root = document.getElementById('main-view');
            root.innerHTML = '';

            if (state.view === 'home') {
                root.innerHTML = `
                    <div class="flex-grow flex flex-col justify-center items-center text-center space-y-8 pt-4 slide-up">
                        <div class="relative">
                            <div class="absolute inset-0 bg-orange-200 blur-2xl opacity-20 rounded-full animate-pulse"></div>
                            <div class="bg-white w-24 h-24 rounded-3xl flex items-center justify-center mx-auto border border-slate-100 shadow-xl relative">
                                <i data-lucide="clipboard-check" class="w-10 h-10 text-orange-600"></i>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <h2 class="text-2xl font-black text-slate-900 leading-none">TEST CFEB-FAP</h2>
                            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Protocolo de Gestión del Error</p>
                        </div>
                        <div class="w-full px-4 space-y-4">
                            <div class="text-left space-y-1.5">
                                <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">Identificación</label>
                                <input type="text" id="player-name" placeholder="Escribe tu nombre o dorsal" 
                                    class="w-full p-4 rounded-2xl border-2 border-slate-50 bg-slate-50/50 focus:border-orange-500 focus:bg-white outline-none font-bold transition-all text-center">
                            </div>
                            <button id="start-btn" class="tap-active w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:bg-orange-600 transition-colors uppercase text-sm tracking-widest">
                                Empezar Test <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
                            </button>
                            <button id="admin-btn" class="text-[9px] font-bold text-slate-300 uppercase tracking-widest hover:text-orange-600 transition-colors py-2">
                                <i data-lucide="shield" class="w-3 h-3 inline mr-1"></i> Panel Staff
                            </button>
                        </div>
                    </div>
                `;
                document.getElementById('start-btn').onclick = () => {
                    const name = document.getElementById('player-name').value.trim();
                    if (!name) return;
                    state.name = name; state.view = 'quiz'; render();
                };
                document.getElementById('admin-btn').onclick = () => { state.view = 'admin'; render(); };
            } else if (state.view === 'quiz') {
                const item = ITEMS[state.idx];
                const progress = (state.idx / ITEMS.length) * 100;
                root.innerHTML = `
                    <div class="slide-up flex flex-col h-full">
                        <div class="mb-8">
                            <div class="flex justify-between items-end mb-2">
                                <span class="text-[9px] font-black text-orange-600 uppercase tracking-[0.2em]">${state.name} | Ítem ${state.idx + 1}</span>
                                <span class="text-xs font-bold text-slate-300">${Math.round(progress)}%</span>
                            </div>
                            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-orange-600 h-full transition-all duration-300" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-10 italic leading-snug">"${item.text}"</h3>
                        <div class="grid gap-2.5">
                            ${[
                                {v:0, l:"Nada / Nunca"},
                                {v:1, l:"Poco / Rara vez"},
                                {v:2, l:"Algo / A veces"},
                                {v:3, l:"Bastante / A menudo"},
                                {v:4, l:"Mucho / Siempre"}
                            ].map(o => `
                                <button onclick="window.record(${o.v})" class="tap-active w-full p-4 rounded-2xl border border-slate-100 bg-white text-left font-bold flex justify-between items-center hover:border-orange-500 hover:bg-orange-50 transition-all shadow-sm">
                                    <span class="text-slate-600 text-sm">${o.l}</span>
                                    <div class="w-6 h-6 rounded-full bg-slate-50 flex items-center justify-center text-[10px] text-slate-300">${o.v}</div>
                                </button>
                            `).join('')}
                        </div>
                        <button onclick="window.back()" class="mt-8 text-[9px] font-black text-slate-300 uppercase tracking-[0.3em] flex items-center gap-2 ${state.idx===0?'invisible':''}">
                            <i data-lucide="arrow-left" class="w-3 h-3"></i> Volver
                        </button>
                    </div>
                `;
            } else if (state.view === 'result') {
                const scores = window.calc(state.answers);
                root.innerHTML = `
                    <div class="slide-up space-y-6 pb-4">
                        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h4 class="text-orange-500 font-black text-[10px] uppercase tracking-widest">Resultado Final</h4>
                                    <h3 class="text-2xl font-black tracking-tight">${state.name}</h3>
                                </div>
                                <i data-lucide="award" class="w-8 h-8 text-white/20"></i>
                            </div>
                            <div class="space-y-4">
                                ${scores.map(s => `
                                    <div class="space-y-1.5">
                                        <div class="flex justify-between text-[9px] font-black uppercase tracking-wider">
                                            <span class="opacity-40">${s.name}</span>
                                            <span class="${s.color}">${s.level} (${s.score})</span>
                                        </div>
                                        <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                                            <div class="h-full ${s.bg}" style="width: ${(s.score/4)*100}%"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="bg-orange-50 p-6 rounded-3xl border border-orange-100 flex gap-4 shadow-sm">
                            <div class="bg-white p-2.5 rounded-xl h-fit border border-orange-100 text-orange-600 shadow-sm">
                                <i data-lucide="lightbulb" class="w-5 h-5"></i>
                            </div>
                            <p class="text-xs text-orange-950 font-bold leading-relaxed">
                                Los datos han sido enviados a la nube. Sigue entrenando tu mentalidad, el error es solo información técnica para mejorar.
                            </p>
                        </div>
                        <button onclick="location.reload()" class="tap-active w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase text-sm tracking-widest shadow-lg">Reiniciar Test</button>
                    </div>
                `;
            } else if (state.view === 'admin') {
                root.innerHTML = `
                    <div class="slide-up space-y-5 flex flex-col h-full">
                        <div class="flex justify-between items-center">
                            <h2 class="text-xl font-black tracking-tight">BASE DE DATOS</h2>
                            <button id="dl-csv" class="bg-green-600 text-white p-2.5 rounded-xl shadow-lg"><i data-lucide="download" class="w-4 h-4"></i></button>
                        </div>
                        <div id="admin-feed" class="flex-grow space-y-2.5 overflow-y-auto no-scrollbar">
                            <p class="text-center py-20 text-slate-300 italic text-xs">Cargando registros del staff...</p>
                        </div>
                        <button onclick="window.go('home')" class="w-full py-4 text-slate-400 font-bold uppercase text-[9px] tracking-widest">Cerrar Panel</button>
                    </div>
                `;
                window.loadAdmin();
                document.getElementById('dl-csv').onclick = () => window.export();
            }
            lucide.createIcons();
        };

        // --- Funciones Globales ---
        window.go = (v) => { state.view = v; render(); };
        window.back = () => { if(state.idx > 0) { state.idx--; render(); } };
        window.record = async (v) => {
            state.answers[ITEMS[state.idx].id] = v;
            if(state.idx < ITEMS.length - 1) {
                state.idx++; render();
            } else {
                state.view = 'result';
                render();
                // Persistencia Cloud
                if (db && currentUser) {
                    try {
                        const scores = window.calc(state.answers);
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'responses'), {
                            playerName: state.name,
                            scores: scores,
                            timestamp: serverTimestamp(),
                            uid: currentUser.uid
                        });
                    } catch (e) { console.error("Cloud Save Failed", e); }
                }
            }
        };

        window.calc = (ans) => {
            const clean = {};
            ITEMS.forEach(it => {
                const val = ans[it.id] || 0;
                clean[it.id] = it.inv ? (4 - val) : val;
            });
            const cats = [
                {n:"Preparación", ids:[1,2,3,4,5]},
                {n:"CCR1 (Reactividad)", ids:[6,7,8,10,16,18]},
                {n:"CCR2 (Disponibilidad)", ids:[4,5,9,11,17,19]},
                {n:"Staff (Entrenador)", ids:[12,13,14,15]}
            ];
            return cats.map(c => {
                const avg = c.ids.reduce((a, b) => a + clean[b], 0) / c.ids.length;
                let lvl = "Bajo", clr = "text-red-400", b = "bg-red-500";
                if(avg >= 1.34) { lvl = "Medio"; clr = "text-orange-400"; b = "bg-orange-500"; }
                if(avg >= 2.67) { lvl = "Alto"; clr = "text-green-400"; b = "bg-green-500"; }
                return { name: c.n, score: avg.toFixed(2), level: lvl, color: clr, bg: b };
            });
        };

        window.loadAdmin = async () => {
            if(!db) return;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'responses'), orderBy('timestamp', 'desc'));
            const snap = await getDocs(q);
            const feed = document.getElementById('admin-feed');
            feed.innerHTML = '';
            if(snap.empty) { feed.innerHTML = '<p class="text-center py-10 opacity-30 text-xs">No hay datos todavía.</p>'; return; }
            snap.forEach(doc => {
                const d = doc.data();
                const t = d.timestamp?.toDate().toLocaleDateString() || 'N/A';
                feed.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center animate-fade-in shadow-sm">
                        <div class="space-y-0.5">
                            <p class="font-black text-slate-800 text-[10px] uppercase">${d.playerName}</p>
                            <p class="text-[8px] text-slate-300 font-bold uppercase tracking-widest">${t}</p>
                        </div>
                        <div class="flex gap-1.5">
                            ${d.scores.map(s => `<span class="${s.color} text-[10px] font-mono font-bold">${s.score}</span>`).join('')}
                        </div>
                    </div>
                `;
            });
        };

        window.export = async () => {
            if(!db) return;
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'responses'));
            let csv = "Jugador,Fecha,Prep,CCR1,CCR2,Staff\n";
            snap.forEach(doc => {
                const d = doc.data();
                csv += `"${d.playerName}",${d.timestamp?.toDate().toISOString() || ''},${d.scores[0].score},${d.scores[1].
