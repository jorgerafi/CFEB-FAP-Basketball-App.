<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CFEB-FAP | Protocolo de Investigación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tap-active:active { transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="app" class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-2xl relative border-x border-slate-200">
        <!-- Header con Estado de Nube -->
        <header class="p-5 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-lg z-50">
            <div class="flex items-center gap-3" id="logo-trigger">
                <div class="bg-blue-900 p-2.5 rounded-2xl shadow-lg shadow-blue-100">
                    <i data-lucide="basketball" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-base leading-none uppercase tracking-tight text-blue-950">CFEB-FAP</h1>
                    <p class="text-[8px] text-blue-600 font-black uppercase tracking-widest mt-1 italic">Investigación</p>
                </div>
            </div>
            <div id="cloud-status" class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-slate-100 bg-slate-50 transition-all duration-500">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                <span id="status-text" class="text-[9px] font-black uppercase tracking-wider text-slate-400 italic">Buscando...</span>
            </div>
        </header>

        <!-- Contenedor Principal -->
        <main id="view-container" class="flex-grow p-6 flex flex-col overflow-y-auto no-scrollbar"></main>

        <!-- Footer Académico -->
        <footer class="p-6 text-center border-t border-slate-50 bg-slate-50/40">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] leading-relaxed">
                Jorge Maroto Cuadrado · CB Estudiantes<br>
                "El fallo es información, no derrota"
            </p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db = null;
        let auth = null;
        let currentUser = null;
        
        // --- MOTOR DE DIAGNÓSTICO ---
        const getEnv = (key) => {
            // Vercel inyecta variables en process.env, pero en el navegador 
            // a veces necesitamos que el build las exponga. 
            // Si usas Vercel con HTML plano, asegúrate de que se llamen exactamente así.
            return window[key] || (typeof process !== 'undefined' ? process.env[key] : null);
        };

        async function connectCloud() {
            const configValue = getEnv('__firebase_config');
            const appId = getEnv('__app_id') || 'fap-estudiantes-2026';

            // Timeout de seguridad: si en 6 segundos no hay respuesta, avisamos.
            const timeout = setTimeout(() => {
                if (!currentUser) updateBadge("Timeout: Revisa Vercel", "bg-orange-400");
            }, 6000);

            if (!configValue) {
                updateBadge("Falta Configuración", "bg-red-500");
                showErrorInView("No se detectan las variables de entorno en Vercel. Asegúrate de haber añadido __firebase_config y __app_id en Settings > Environment Variables y haber hecho un 'Redeploy'.");
                return;
            }

            try {
                // Intentamos parsear el JSON (Vercel a veces lo entrega con comillas extra)
                let config;
                try {
                    config = typeof configValue === 'string' ? JSON.parse(configValue.trim()) : configValue;
                } catch (e) {
                    // Si falla el parseo, probamos a limpiar posibles comillas exteriores
                    const cleaned = configValue.replace(/^['"]|['"]$/g, '');
                    config = JSON.parse(cleaned);
                }

                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        clearTimeout(timeout);
                        updateBadge("Cloud Online", "bg-green-500");
                        if(state.view === 'intro') render(); // Refrescar para quitar posibles errores
                    }
                });
            } catch (err) {
                updateBadge("Error Firebase", "bg-red-600");
                showErrorInView("Error de conexión: " + err.message);
                console.error(err);
            }
        }

        function updateBadge(text, colorClass) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if(dot && txt) {
                dot.className = `w-2 h-2 rounded-full ${colorClass} ${colorClass.includes('green') ? 'animate-pulse' : ''}`;
                txt.innerText = text;
                txt.className = `text-[9px] font-black uppercase tracking-wider ${colorClass.replace('bg-', 'text-')}`;
            }
        }

        function showErrorInView(msg) {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="flex-grow flex flex-col justify-center items-center text-center p-4 slide-up">
                    <div class="bg-red-50 p-6 rounded-[2rem] border border-red-100 space-y-4">
                        <i data-lucide="alert-triangle" class="w-10 h-10 text-red-500 mx-auto"></i>
                        <h3 class="font-black text-red-900 uppercase italic">Error de Sistema</h3>
                        <p class="text-xs text-red-700 font-bold leading-relaxed">${msg}</p>
                        <button onclick="location.reload()" class="bg-red-500 text-white text-[10px] font-black px-6 py-3 rounded-2xl uppercase tracking-widest">Reintentar</button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // --- LÓGICA DE LA APP (IDEM ANTERIOR) ---
        const ITEMS = [
            { id: 1, text: "Antes del partido me siento preparado emocionalmente para competir", cat: "PREP" },
            { id: 2, text: "Antes de jugar pienso mucho en no cometer errores", cat: "PREP", inv: true },
            { id: 3, text: "Me siento nervioso o tenso antes de empezar el partido", cat: "PREP", inv: true },
            { id: 4, text: "Me siento con confianza para seguir jugando aunque falle", cat: "PREP" },
            { id: 5, text: "Me siento disponible para asumir responsabilidades en el juego", cat: "PREP" },
            { id: 6, text: "Cuando cometo un error, me bloqueo emocionalmente", cat: "CCR1", inv: true },
            { id: 7, text: "Después de fallar, tardo en volver a concentrarme", cat: "CCR1", inv: true },
            { id: 8, text: "Evito participar en la siguiente jugada tras un error", cat: "CCR1", inv: true },
            { id: 9, text: "Soy capaz de centrarme rápido en la siguiente acción", cat: "CCR2" },
            { id: 10, text: "El error baja mi intensidad defensiva", cat: "CCR1", inv: true },
            { id: 11, text: "Después de fallar, sigo disponible para recibir el balón", cat: "CCR2" },
            { id: 12, text: "Las indicaciones del entrenador me ayudan después de un error", cat: "STAFF" },
            { id: 13, text: "El feedback del entrenador reduce mi malestar cuando fallo", cat: "STAFF" },
            { id: 14, text: "A veces las indicaciones del entrenador me generan más presión", cat: "STAFF", inv: true },
            { id: 15, text: "Me siento apoyado por el entrenador cuando cometo errores", cat: "STAFF" },
            { id: 16, text: "Después del partido sigo dándole vueltas a mis errores", cat: "CCR1", inv: true },
            { id: 17, text: "Me resulta fácil soltar el partido a nivel emocional", cat: "CCR2" },
            { id: 18, text: "Los errores afectan a mi estado de ánimo después del partido", cat: "CCR1", inv: true },
            { id: 19, text: "Soy capaz de aprender de los errores sin machacarme", cat: "CCR2" }
        ];

        let state = { view: 'intro', player: '', current: 0, answers: {} };

        const render = () => {
            const container = document.getElementById('view-container');
            if (container.querySelector('.bg-red-50')) return; // No pisar el error si existe
            
            container.innerHTML = '';
            if (state.view === 'intro') {
                container.innerHTML = `
                    <div class="flex-grow flex flex-col justify-center items-center text-center space-y-12 slide-up pt-10">
                        <div class="space-y-4">
                            <div class="bg-blue-50 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto border border-blue-100 shadow-xl">
                                <i data-lucide="microscope" class="w-10 h-10 text-blue-900"></i>
                            </div>
                            <h2 class="text-3xl font-black text-slate-900 italic tracking-tighter uppercase">Protocolo FAP</h2>
                            <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] px-10 italic">Investigación CB Estudiantes</p>
                        </div>
                        <div class="w-full space-y-6">
                            <input type="text" id="input-name" placeholder="Nombre o ID del Jugador" 
                                class="w-full p-5 rounded-3xl bg-slate-50 border-2 border-transparent focus:border-blue-900 outline-none font-bold text-center transition-all shadow-inner">
                            <button id="btn-start" class="tap-active w-full bg-blue-950 text-white font-black py-5 rounded-3xl shadow-2xl flex items-center justify-center gap-4 uppercase text-xs tracking-[0.2em]">
                                Empezar <i data-lucide="chevron-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <button id="btn-admin" class="text-[9px] font-black text-slate-300 uppercase tracking-widest hover:text-blue-900">Historial Staff <i data-lucide="lock" class="w-2.5 h-2.5 inline ml-1"></i></button>
                    </div>
                `;
                document.getElementById('btn-start').onclick = () => {
                    const name = document.getElementById('input-name').value.trim();
                    if (!name) return;
                    state.player = name; state.view = 'quiz'; render();
                };
                document.getElementById('btn-admin').onclick = () => { state.view = 'admin'; render(); };
            } 
            else if (state.view === 'quiz') {
                const item = ITEMS[state.current];
                container.innerHTML = `
                    <div class="slide-up">
                        <div class="flex justify-between items-center mb-8">
                            <span class="text-[10px] font-black text-blue-800 uppercase italic tracking-widest">${state.player}</span>
                            <span class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">${state.current + 1} / 19</span>
                        </div>
                        <h3 class="text-2xl font-black text-slate-800 leading-tight italic mb-10">"${item.text}"</h3>
                        <div class="grid gap-3">
                            ${[0, 1, 2, 3, 4].map(v => `
                                <button onclick="window.saveOption(${v})" class="tap-active w-full p-5 rounded-2xl border-2 border-slate-50 bg-white text-left font-bold flex justify-between items-center hover:border-blue-900 shadow-sm transition-all">
                                    <span class="text-slate-600 text-sm font-bold uppercase tracking-wide">
                                        ${v === 0 ? 'Nunca' : v === 4 ? 'Siempre' : v === 2 ? 'A veces' : 'Nivel ' + v}
                                    </span>
                                    <div class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-[10px] text-slate-300 font-black">${v}</div>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (state.view === 'results') {
                container.innerHTML = `<div class="py-20 text-center font-black italic uppercase text-slate-400">Enviando a la nube...</div>`;
                window.finishTest();
            }
            else if (state.view === 'admin') {
                container.innerHTML = `<div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic">HISTORIAL</h2>
                    <button onclick="window.go('intro')" class="text-slate-400"><i data-lucide="x"></i></button>
                </div><div id="data-list" class="space-y-4"></div>`;
                window.loadData();
            }
            lucide.createIcons();
        };

        window.go = (v) => { state.view = v; render(); };
        window.saveOption = (val) => {
            state.answers[ITEMS[state.current].id] = val;
            if (state.current < ITEMS.length - 1) { state.current++; render(); }
            else { state.view = 'results'; render(); }
        };

        window.finishTest = async () => {
            const results = window.calculateResults(state.answers);
            if (db && currentUser) {
                try {
                    await addDoc(collection(db, 'artifacts', getEnv('__app_id') || 'fap-est-26', 'public', 'data', 'responses'), {
                        playerName: state.player,
                        timestamp: serverTimestamp(),
                        scores: results,
                        raw: state.answers,
                        uid: currentUser.uid
                    });
                } catch (e) { console.error(e); }
            }
            document.getElementById('view-container').innerHTML = `
                <div class="slide-up space-y-6 text-center py-10">
                    <div class="bg-blue-950 p-10 rounded-[3rem] text-white shadow-2xl">
                        <h4 class="text-blue-400 font-black text-[10px] uppercase tracking-widest mb-4">Completado</h4>
                        <h3 class="text-2xl font-black italic mb-6 uppercase tracking-tighter">${state.player}</h3>
                        <p class="text-xs font-bold text-blue-200 leading-relaxed uppercase tracking-widest">Tus datos han sido registrados correctamente en la investigación.</p>
                    </div>
                    <button onclick="location.reload()" class="w-full py-5 bg-slate-900 text-white font-black rounded-3xl uppercase text-xs tracking-widest">Finalizar</button>
                </div>
            `;
        };

        window.calculateResults = (ans) => {
            const cats = [
                {n:"Prep", ids:[1,2,3,4,5]}, {n:"CCR1", ids:[6,7,8,10,16,18]},
                {n:"CCR2", ids:[4,5,9,11,17,19]}, {n:"Staff", ids:[12,13,14,15]}
            ];
            return cats.map(c => {
                const total = c.ids.reduce((a, b) => {
                    const item = ITEMS.find(i => i.id === b);
                    const v = ans[b] || 0;
                    return a + (item.inv ? (4 - v) : v);
                }, 0);
                return { name: c.n, score: (total / c.ids.length).toFixed(2) };
            });
        };

        window.loadData = async () => {
            if (!db) return;
            const q = query(collection(db, 'artifacts', getEnv('__app_id') || 'fap-est-26', 'public', 'data', 'responses'), orderBy('timestamp', 'desc'));
            const snap = await getDocs(q);
            const list = document.getElementById('data-list');
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-black text-slate-900 uppercase italic">${d.playerName}</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase">${d.timestamp?.toDate().toLocaleDateString()}</p>
                        </div>
                        <div class="flex gap-1">
                            ${d.scores.map(s => `<span class="text-[9px] font-black bg-white px-2 py-1 rounded border border-slate-100">${s.score}</span>`).join('')}
                        </div>
                    </div>
                `;
            });
        };

        connectCloud();
        render();
    </script>
</body>
</html>
