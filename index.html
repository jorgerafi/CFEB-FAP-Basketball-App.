<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFEB-FAP | Test de Resiliencia en Baloncesto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        window.FB = { initializeApp, getFirestore, collection, addDoc, getDocs, query, orderBy, getAuth, signInAnonymously };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURACIÓN CRÍTICA ---
        // 1. Si usas Vercel, intenta leer de las variables de entorno.
        // 2. Si lo subes a GitHub manualmente, rellena los datos de abajo.
        
        let firebaseConfig = {};
        
        try {
            if (window.__firebase_config) {
                firebaseConfig = JSON.parse(window.__firebase_config);
            } else {
                // SUSTITUYE ESTOS DATOS POR LOS DE TU CONSOLA DE FIREBASE (Project Settings -> General)
                firebaseConfig = {
                    apiKey: "TU_API_KEY_REAL_AQUÍ",
                    authDomain: "tu-proyecto.firebaseapp.com",
                    projectId: "tu-proyecto-id",
                    storageBucket: "tu-proyecto.appspot.com",
                    messagingSenderId: "tu-sender-id",
                    appId: "tu-app-id"
                };
            }
        } catch (e) {
            console.error("Error al cargar la configuración de Firebase", e);
        }

        const appId = window.__app_id || 'fap-basketball-app';

        // --- ICONOS ---
        const TrophyIcon = () => (<svg className="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>);

        // --- PREGUNTAS Y LÓGICA ---
        const QUESTIONS = [
            { id: 1, text: "Antes del partido me siento preparado emocionalmente para competir", section: "ANTES", inverted: false },
            { id: 2, text: "Antes de jugar pienso mucho en no cometer errores", section: "ANTES", inverted: true },
            { id: 3, text: "Me siento nervioso o tenso antes de empezar el partido", section: "ANTES", inverted: true },
            { id: 4, text: "Me siento con confianza para seguir jugando aunque falle", section: "ANTES", inverted: false },
            { id: 5, text: "Me siento disponible para asumir responsabilidades en el juego", section: "ANTES", inverted: false },
            { id: 6, text: "Cuando cometo un error, me bloqueo emocionalmente", section: "DURANTE", inverted: true },
            { id: 7, text: "Después de fallar, tardo en volver a concentrarme", section: "DURANTE", inverted: true },
            { id: 8, text: "Evito participar en la siguiente jugada tras un error", section: "DURANTE", inverted: true },
            { id: 9, text: "Soy capaz de centrarme rápido en la siguiente acción", section: "DURANTE", inverted: false },
            { id: 10, text: "El error baja mi intensidad defensiva", section: "DURANTE", inverted: true },
            { id: 11, text: "Después de fallar, sigo disponible para recibir el balón", section: "DURANTE", inverted: false },
            { id: 12, text: "Las indicaciones del entrenador me ayudan después de un error", section: "ENTRENADOR", inverted: false },
            { id: 13, text: "El feedback del entrenador reduce mi malestar cuando fallo", section: "ENTRENADOR", inverted: false },
            { id: 14, text: "A veces las indicaciones del entrenador me generan más presión", section: "ENTRENADOR", inverted: true },
            { id: 15, text: "Me siento apoyado por el entrenador cuando cometo errores", section: "ENTRENADOR", inverted: false },
            { id: 16, text: "Después del partido sigo dándole vueltas a mis errores", section: "DESPUÉS", inverted: true },
            { id: 17, text: "Me resulta fácil soltar el partido a nivel emocional", section: "DESPUÉS", inverted: false },
            { id: 18, text: "Los errores afectan a mi estado de ánimo después del partido", section: "DESPUÉS", inverted: true },
            { id: 19, text: "Soy capaz de aprender de los errores sin machacarme", section: "DESPUÉS", inverted: false },
        ];

        const SCALES = {
            PREPARACION: { name: "Preparación Pre-partido", items: [1, 2, 3, 4, 5] },
            REACTIVIDAD: { name: "Reactividad al Error (CCR1)", items: [6, 7, 8, 10, 16, 18] },
            DISPONIBILIDAD: { name: "Disponibilidad Post-error (CCR2)", items: [4, 5, 9, 11, 17, 19] },
            ENTRENADOR: { name: "Apoyo del Entrenador", items: [12, 13, 14, 15] },
        };

        function App() {
            const [view, setView] = React.useState('welcome');
            const [currentStep, setCurrentStep] = React.useState(0);
            const [answers, setAnswers] = React.useState({});
            const [db, setDb] = React.useState(null);
            const [user, setUser] = React.useState(null);
            const [adminData, setAdminData] = React.useState([]);
            const [adminPass, setAdminPass] = React.useState("");
            const [errorMsg, setErrorMsg] = React.useState(null);

            React.useEffect(() => {
                const init = async () => {
                    try {
                        const app = FB.initializeApp(firebaseConfig);
                        const _db = FB.getFirestore(app);
                        const _auth = FB.getAuth(app);
                        const cred = await FB.signInAnonymously(_auth);
                        setDb(_db);
                        setUser(cred.user);
                        setErrorMsg(null);
                    } catch(e) { 
                        console.error("Error Firebase:", e); 
                        setErrorMsg("Error de conexión: Verifica tu API Key en el código.");
                    }
                };
                init();
            }, []);

            const calculateResults = (ans) => {
                const res = {};
                Object.keys(SCALES).forEach(key => {
                    const items = SCALES[key].items;
                    const scores = items.map(id => {
                        const q = QUESTIONS.find(q => q.id === id);
                        return q.inverted ? 4 - ans[id] : ans[id];
                    });
                    res[key] = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(2);
                });
                return res;
            };

            const handleFinish = async () => {
                const results = calculateResults(answers);
                if (db && user) {
                    try {
                        const coll = FB.collection(db, 'artifacts', appId, 'public', 'data', 'responses');
                        await FB.addDoc(coll, {
                            userId: user.uid,
                            timestamp: new Date().toISOString(),
                            answers,
                            results
                        });
                    } catch(e) { console.error("Error guardando:", e); }
                }
                setView('results');
            };

            const loadAdmin = async () => {
                if (adminPass !== "CFEB2026") return alert("Acceso denegado");
                if (!db) return alert("La base de datos no está conectada.");
                const coll = FB.collection(db, 'artifacts', appId, 'public', 'data', 'responses');
                const snap = await FB.getDocs(coll);
                setAdminData(snap.docs.map(d => ({id: d.id, ...d.data()})));
                setView('admin');
            };

            if (view === 'welcome') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50">
                    <div className="max-w-md w-full bg-white rounded-[3rem] shadow-2xl p-10 text-center border border-slate-100">
                        {errorMsg && (
                            <div className="mb-4 p-3 bg-red-50 text-red-600 text-xs rounded-xl font-bold">
                                {errorMsg}
                            </div>
                        )}
                        <div className="bg-orange-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-orange-600">
                            <TrophyIcon />
                        </div>
                        <h1 className="text-3xl font-black text-slate-800 mb-2">CFEB-FAP</h1>
                        <p className="text-slate-500 text-sm mb-8 italic">"El fallo es parte del aprendizaje y no solo una derrota."</p>
                        <button onClick={() => setView('survey')} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold shadow-xl mb-6">Comenzar Test</button>
                        
                        <div className="mt-10 pt-6 border-t border-slate-50">
                            <input type="password" placeholder="Acceso Staff" className="w-full mb-3 p-3 border rounded-xl text-center bg-slate-100 text-xs outline-none" onChange={e => setAdminPass(e.target.value)} />
                            <button onClick={loadAdmin} className="text-slate-400 text-[10px] font-black tracking-widest uppercase hover:text-slate-600 transition">Panel Admin</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'survey') {
                const q = QUESTIONS[currentStep];
                return (
                    <div className="min-h-screen bg-white p-6 flex flex-col items-center">
                        <div className="max-w-xl w-full pt-12">
                            <div className="flex justify-between text-[11px] font-black text-slate-400 mb-4 uppercase"><span>{q.section}</span><span>{currentStep + 1}/{QUESTIONS.length}</span></div>
                            <div className="w-full bg-slate-100 h-1 rounded-full mb-16 overflow-hidden">
                                <div className="bg-orange-500 h-full transition-all" style={{width: `${((currentStep+1)/QUESTIONS.length)*100}%`}}></div>
                            </div>
                            <h2 className="text-2xl font-bold text-slate-900 mb-20 text-center">{q.text}</h2>
                            <div className="flex justify-between max-w-sm mx-auto mb-6">
                                {[0, 1, 2, 3, 4].map(v => (
                                    <button key={v} onClick={() => setAnswers({...answers, [q.id]: v})} className={`w-14 h-14 rounded-2xl border-2 font-black transition-all ${answers[q.id] === v ? 'border-orange-500 bg-orange-500 text-white scale-110 shadow-lg' : 'border-slate-100 text-slate-300'}`}>{v}</button>
                                ))}
                            </div>
                            <div className="flex justify-between text-[10px] text-slate-400 font-bold uppercase max-w-sm mx-auto px-2"><span>Nunca</span><span>Siempre</span></div>
                            <div className="flex gap-4 fixed bottom-12 left-0 right-0 max-w-xl mx-auto px-6">
                                <button onClick={() => setCurrentStep(Math.max(0, currentStep-1))} className={`p-4 bg-slate-50 rounded-2xl ${currentStep === 0 ? 'invisible' : ''}`}>←</button>
                                {currentStep < QUESTIONS.length - 1 ? (
                                    <button disabled={answers[q.id] === undefined} onClick={() => setCurrentStep(currentStep + 1)} className="flex-1 py-5 bg-slate-900 text-white rounded-2xl font-bold disabled:opacity-20 shadow-xl">Siguiente</button>
                                ) : (
                                    <button disabled={answers[q.id] === undefined} onClick={handleFinish} className="flex-1 py-5 bg-orange-600 text-white rounded-2xl font-bold shadow-xl">Ver Resultados</button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'results') {
                const results = calculateResults(answers);
                return (
                    <div className="min-h-screen bg-slate-50 p-6 flex flex-col items-center">
                        <div className="max-w-2xl w-full bg-white rounded-[3rem] shadow-2xl p-10">
                            <h1 className="text-3xl font-black mb-8 text-center">Informe de Resiliencia</h1>
                            <div className="space-y-6">
                                {Object.keys(SCALES).map(k => (
                                    <div key={k} className="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                        <div className="flex justify-between mb-2">
                                            <span className="text-xs font-black text-slate-400 uppercase">{SCALES[k].name}</span>
                                            <span className="font-black text-xl">{results[k]}</span>
                                        </div>
                                        <div className="h-2.5 bg-white rounded-full overflow-hidden border border-slate-200">
                                            <div className="h-full bg-slate-900" style={{width: `${(results[k]/4)*100}%`}}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => window.location.reload()} className="w-full mt-10 py-5 bg-slate-900 text-white rounded-2xl font-bold">Cerrar</button>
                        </div>
                    </div>
                );
            }

            if (view === 'admin') return (
                <div className="min-h-screen bg-slate-50 p-6">
                    <div className="max-w-5xl mx-auto">
                        <div className="flex justify-between items-center mb-10">
                            <h1 className="text-3xl font-black italic">Datos Estudio CFEB-FAP</h1>
                            <button onClick={() => setView('welcome')} className="text-xs font-black text-slate-400 uppercase tracking-widest">Cerrar</button>
                        </div>
                        <div className="bg-white rounded-[2rem] shadow-sm overflow-x-auto border border-slate-100 p-6">
                            <table className="w-full text-left text-sm">
                                <thead>
                                    <tr className="border-b text-slate-400"><th className="p-4 uppercase text-[10px] font-black">ID Atleta</th><th className="p-4 uppercase text-[10px] font-black">Timestamp</th><th className="p-4 uppercase text-[10px] font-black">CCR1 (Bloqueo)</th><th className="p-4 uppercase text-[10px] font-black">CCR2 (Reenganche)</th></tr>
                                </thead>
                                <tbody>
                                    {adminData.length === 0 ? (
                                        <tr><td colSpan="4" className="p-10 text-center text-slate-400">No hay datos registrados aún.</td></tr>
                                    ) : adminData.map(d => (
                                        <tr key={d.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                            <td className="p-4 font-mono text-xs text-slate-400">...{d.userId.slice(-5)}</td>
                                            <td className="p-4 text-xs">{new Date(d.timestamp).toLocaleString()}</td>
                                            <td className="p-4 font-bold text-slate-700">{d.results.REACTIVIDAD}</td>
                                            <td className="p-4 font-bold text-slate-700">{d.results.DISPONIBILIDAD}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
