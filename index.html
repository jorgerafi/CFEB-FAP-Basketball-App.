<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFEB-FAP | Test de Resiliencia en Baloncesto</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar el código JSX directamente -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // Definición manual de iconos SVG sencillos para evitar errores de librería externa
        const TrophyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );

        const ChevronLeftIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        );

        // --- CONSTANTES ---
        const ZENODO_DOI = "10.5281/zenodo.18862811";
        const QUESTIONS = [
            { id: 1, text: "Antes del partido me siento preparado emocionalmente para competir", section: "ANTES", inverted: false },
            { id: 2, text: "Antes de jugar pienso mucho en no cometer errores", section: "ANTES", inverted: true },
            { id: 3, text: "Me siento nervioso o tenso antes de empezar el partido", section: "ANTES", inverted: true },
            { id: 4, text: "Me siento con confianza para seguir jugando aunque falle", section: "ANTES", inverted: false },
            { id: 5, text: "Me siento disponible para asumir responsabilidades en el juego", section: "ANTES", inverted: false },
            { id: 6, text: "Cuando cometo un error, me bloqueo emocionalmente", section: "DURANTE", inverted: true },
            { id: 7, text: "Después de fallar, tardo en volver a concentrarme", section: "DURANTE", inverted: true },
            { id: 8, text: "Evito participar en la siguiente jugada tras un error", section: "DURANTE", inverted: true },
            { id: 9, text: "Soy capaz de centrarme rápido en la siguiente acción", section: "DURANTE", inverted: false },
            { id: 10, text: "El error baja mi intensidad defensiva", section: "DURANTE", inverted: true },
            { id: 11, text: "Después de fallar, sigo disponible para recibir el balón", section: "DURANTE", inverted: false },
            { id: 12, text: "Las indicaciones del entrenador me ayudan después de un error", section: "ENTRENADOR", inverted: false },
            { id: 13, text: "El feedback del entrenador reduce mi malestar cuando fallo", section: "ENTRENADOR", inverted: false },
            { id: 14, text: "A veces las indicaciones del entrenador me generan más presión", section: "ENTRENADOR", inverted: true },
            { id: 15, text: "Me siento apoyado por el entrenador cuando cometo errores", section: "ENTRENADOR", inverted: false },
            { id: 16, text: "Después del partido sigo dándole vueltas a mis errores", section: "DESPUÉS", inverted: true },
            { id: 17, text: "Me resulta fácil soltar el partido a nivel emocional", section: "DESPUÉS", inverted: false },
            { id: 18, text: "Los errores afectan a mi estado de ánimo después del partido", section: "DESPUÉS", inverted: true },
            { id: 19, text: "Soy capaz de aprender de los errores sin machacarme", section: "DESPUÉS", inverted: false },
        ];

        const SCALES = {
            PREPARACION: { name: "Preparación Pre-partido", items: [1, 2, 3, 4, 5] },
            REACTIVIDAD: { name: "Reactividad al Error (CCR1)", items: [6, 7, 8, 10, 16, 18] },
            DISPONIBILIDAD: { name: "Disponibilidad Post-error (CCR2)", items: [4, 5, 9, 11, 17, 19] },
            ENTRENADOR: { name: "Entrenador (Apoyo Funcional)", items: [12, 13, 14, 15] },
        };

        function App() {
            const [view, setView] = React.useState('welcome');
            const [currentStep, setCurrentStep] = React.useState(0);
            const [answers, setAnswers] = React.useState({});

            const calculateResults = (dataAnswers) => {
                const results = {};
                Object.keys(SCALES).forEach(key => {
                    const scale = SCALES[key];
                    const scores = scale.items.map(id => {
                        const q = QUESTIONS.find(q => q.id === id);
                        const val = dataAnswers[id];
                        return q.inverted ? 4 - val : val;
                    });
                    results[key] = parseFloat((scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(2));
                });
                return results;
            };

            const getInterpretation = (score) => {
                if (score >= 2.67) return { label: "Alto", color: "text-green-600" };
                if (score >= 1.34) return { label: "Medio", color: "text-yellow-600" };
                return { label: "Bajo", color: "text-red-600" };
            };

            if (view === 'welcome') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
                            <div className="bg-orange-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-orange-600">
                                <TrophyIcon />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 mb-1">CFEB-FAP</h1>
                            <p className="text-slate-500 text-sm mb-6 italic">"El fallo es parte del aprendizaje y no solo una derrota."</p>
                            
                            <button 
                                onClick={() => setView('survey')}
                                className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-black transition shadow-xl mb-6"
                            >
                                Comenzar Evaluación
                            </button>

                            <div className="pt-6 border-t border-slate-50">
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Registro Científico</p>
                                <span className="inline-flex items-center px-3 py-1 bg-slate-100 rounded-full text-[10px] font-mono text-slate-500">
                                    DOI: {ZENODO_DOI}
                                </span>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'survey') {
                const q = QUESTIONS[currentStep];
                return (
                    <div className="min-h-screen bg-white p-4 flex flex-col items-center">
                        <div className="max-w-xl w-full pt-10">
                            <div className="flex justify-between items-center mb-4 text-[10px] font-black text-slate-400 uppercase">
                                <span>{q.section}</span>
                                <span>{currentStep + 1}/{QUESTIONS.length}</span>
                            </div>
                            <div className="w-full bg-slate-100 h-1 rounded-full mb-12">
                                <div className="bg-orange-500 h-full transition-all" style={{ width: `${((currentStep+1)/QUESTIONS.length)*100}%` }}></div>
                            </div>
                            <h2 className="text-xl md:text-2xl font-bold text-slate-900 mb-16 text-center leading-tight">{q.text}</h2>
                            <div className="flex justify-between max-w-sm mx-auto mb-4">
                                {[0, 1, 2, 3, 4].map(val => (
                                    <button 
                                        key={val} 
                                        onClick={() => setAnswers({...answers, [q.id]: val})}
                                        className={`w-12 h-12 md:w-14 md:h-14 rounded-2xl border-2 flex items-center justify-center text-lg font-black transition-all ${answers[q.id] === val ? 'border-orange-500 bg-orange-500 text-white' : 'border-slate-100 text-slate-300'}`}
                                    >
                                        {val}
                                    </button>
                                ))}
                            </div>
                            <div className="flex justify-between text-[10px] text-slate-400 font-black uppercase max-w-sm mx-auto px-1">
                                <span>Nunca</span><span>Siempre</span>
                            </div>
                            <div className="flex justify-between gap-4 fixed bottom-10 left-0 right-0 max-w-xl mx-auto px-4">
                                <button onClick={() => setCurrentStep(Math.max(0, currentStep-1))} className={`p-4 ${currentStep===0?'invisible':''}`}>
                                    <ChevronLeftIcon />
                                </button>
                                {currentStep < QUESTIONS.length - 1 ? (
                                    <button disabled={answers[q.id]===undefined} onClick={() => setCurrentStep(currentStep+1)} className="flex-1 py-4 bg-slate-900 text-white rounded-2xl font-bold disabled:opacity-20">Siguiente</button>
                                ) : (
                                    <button onClick={() => setView('results')} className="flex-1 py-4 bg-orange-600 text-white rounded-2xl font-bold">Ver Resultados</button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'results') {
                const results = calculateResults(answers);
                return (
                    <div className="min-h-screen bg-slate-50 p-4 md:p-8 flex flex-col items-center">
                        <div className="max-w-2xl w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden">
                            <div className="bg-slate-900 p-8 text-white">
                                <h1 className="text-2xl font-black">Tu Informe de Resiliencia</h1>
                                <p className="text-slate-400 text-sm">Protocolo CFEB-FAP (DOI: {ZENODO_DOI})</p>
                            </div>
                            <div className="p-8">
                                <div className="space-y-6">
                                    {Object.keys(SCALES).map(key => {
                                        const score = results[key];
                                        const interp = getInterpretation(score);
                                        return (
                                            <div key={key} className="p-4 bg-slate-50 rounded-2xl">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-xs font-black text-slate-500 uppercase">{SCALES[key].name}</span>
                                                    <span className={`text-xs font-bold ${interp.color}`}>{interp.label} ({score})</span>
                                                </div>
                                                <div className="h-2 bg-white rounded-full overflow-hidden border border-slate-100">
                                                    <div className="h-full bg-slate-900" style={{width:`${(score/4)*100}%`}}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={() => window.location.reload()} className="w-full mt-8 py-4 bg-slate-900 text-white rounded-2xl font-bold">Finalizar</button>
                            </div>
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
