<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFEB-FAP | Gestión del Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tap-active:active { transform: scale(0.96); }
        .progress-bar { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div id="app" class="min-h-screen flex flex-col max-w-lg mx-auto bg-white shadow-2xl shadow-slate-200">
        <!-- Cabecera -->
        <header class="p-5 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-50">
            <div class="flex items-center gap-3">
                <div class="bg-orange-600 p-2 rounded-xl shadow-lg shadow-orange-100">
                    <i data-lucide="basketball" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg leading-none tracking-tight">CFEB-FAP</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Análisis Funcional</p>
                </div>
            </div>
            <div class="flex items-center gap-1.5 bg-green-50 px-3 py-1.5 rounded-full border border-green-100">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-black text-green-700 tracking-wider">NUBE OK</span>
            </div>
        </header>

        <!-- Contenedor Dinámico -->
        <main id="main-view" class="flex-grow p-6 flex flex-col"></main>

        <!-- Pie de página -->
        <footer class="p-6 text-center border-t border-slate-50 bg-slate-50/20">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] leading-loose">
                Protocolo CFEB-FAP · Jorge Maroto Cuadrado<br>Vercel & Firebase Cloud Storage
            </p>
        </footer>
    </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración Global
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'cfeb-fap-final-deployment';

        // 19 Ítems según Protocolo PDF
        const ITEMS = [
            { id: 1, text: "Antes del partido me siento preparado emocionalmente para competir", cat: "Pre" },
            { id: 2, text: "Antes de jugar pienso mucho en no cometer errores", cat: "Pre", inv: true },
            { id: 3, text: "Me siento nervioso o tenso antes de empezar el partido", cat: "Pre", inv: true },
            { id: 4, text: "Me siento con confianza para seguir jugando aunque falle", cat: "Pre" },
            { id: 5, text: "Me siento disponible para asumir responsabilidades en el juego", cat: "Pre" },
            { id: 6, text: "Cuando cometo un error, me bloqueo emocionalmente", cat: "CCR1", inv: true },
            { id: 7, text: "Después de fallar, tardo en volver a concentrarme", cat: "CCR1", inv: true },
            { id: 8, text: "Evito participar en la siguiente jugada tras un error", cat: "CCR1", inv: true },
            { id: 9, text: "Soy capaz de centrarme rápido en la siguiente acción", cat: "CCR2" },
            { id: 10, text: "El error baja mi intensidad defensiva", cat: "CCR1", inv: true },
            { id: 11, text: "Después de fallar, sigo disponible para recibir el balón", cat: "CCR2" },
            { id: 12, text: "Las indicaciones del entrenador me ayudan después de un error", cat: "Coach" },
            { id: 13, text: "El feedback del entrenador reduce mi malestar cuando fallo", cat: "Coach" },
            { id: 14, text: "A veces las indicaciones del entrenador me generan más presión", cat: "Coach", inv: true },
            { id: 15, text: "Me siento apoyado por el entrenador cuando cometo errores", cat: "Coach" },
            { id: 16, text: "Después del partido sigo dándole vueltas a mis errores", cat: "CCR1", inv: true },
            { id: 17, text: "Me resulta fácil soltar el partido a nivel emocional", cat: "CCR2" },
            { id: 18, text: "Los errores afectan a mi estado de ánimo después del partido", cat: "CCR1", inv: true },
            { id: 19, text: "Soy capaz de aprender de los errores sin machacarme", cat: "CCR2" }
        ];

        let state = { view: 'home', currentIdx: 0, answers: {}, user: null };

        const render = () => {
            const root = document.getElementById('main-view');
            root.innerHTML = '';

            if (state.view === 'home') {
                root.innerHTML = `
                    <div class="space-y-8 pt-8 slide-up text-center">
                        <div class="bg-orange-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto shadow-inner border border-orange-100">
                             <i data-lucide="brain-circuit" class="w-12 h-12 text-orange-600"></i>
                        </div>
                        <div class="space-y-3">
                            <h2 class="text-3xl font-black text-slate-900 leading-tight">Tu mentalidad tras el error.</h2>
                            <p class="text-slate-400 text-sm px-4">Evaluación de la respuesta emocional y funcional ante el fallo en competición.</p>
                        </div>
                        <div class="pt-6 space-y-4">
                            <button onclick="window.go('quiz')" class="tap-active w-full bg-slate-900 text-white font-extrabold py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3">
                                Comenzar Test <i data-lucide="play-circle" class="w-6 h-6"></i>
                            </button>
                            <button onclick="window.go('admin')" class="w-full text-slate-300 font-bold py-2 text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                                <i data-lucide="lock" class="w-3 h-3"></i> Acceso Administrador
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'quiz') {
                const item = ITEMS[state.currentIdx];
                const progress = (state.currentIdx / ITEMS.length) * 100;
                root.innerHTML = `
                    <div class="slide-up flex flex-col h-full">
                        <div class="mb-10">
                            <div class="flex justify-between items-end mb-3">
                                <span class="text-[10px] font-black text-orange-600 uppercase tracking-widest">Ítem ${state.currentIdx + 1} de 19</span>
                                <span class="text-xs font-bold text-slate-300">${Math.round(progress)}%</span>
                            </div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-orange-600 h-full progress-bar" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        
                        <div class="flex-grow">
                            <h3 class="text-2xl font-bold text-slate-800 leading-tight mb-12 italic">"${item.text}"</h3>
                            
                            <div class="grid gap-3">
                                ${[0, 1, 2, 3, 4].map(v => `
                                    <button onclick="window.save(${v})" class="tap-active w-full p-5 rounded-2xl border-2 border-slate-50 bg-white text-left flex justify-between items-center hover:border-orange-500 hover:bg-orange-50 transition-all">
                                        <div class="flex items-center gap-4">
                                            <span class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 text-slate-500 font-bold text-sm">${v}</span>
                                            <span class="font-bold text-slate-700">${v === 0 ? 'Nada' : v === 4 ? 'Mucho' : v === 2 ? 'A veces' : ''}</span>
                                        </div>
                                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-200"></i>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.view === 'report') {
                const results = window.calculate(state.answers);
                const profile = window.interpret(results);
                root.innerHTML = `
                    <div class="slide-up space-y-6">
                        <div class="text-center py-4">
                            <i data-lucide="check-circle" class="w-14 h-14 text-green-500 mx-auto mb-4"></i>
                            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Análisis Completado</h2>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Informe Emocional del Jugador</p>
                        </div>

                        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-8 opacity-10">
                                <i data-lucide="award" class="w-20 h-20"></i>
                            </div>
                            <h4 class="text-[10px] font-black uppercase tracking-widest text-orange-500 mb-4 flex items-center gap-2">
                                <i data-lucide="user-check" class="w-3 h-3"></i> Perfil Narrativo
                            </h4>
                            <p class="text-base leading-relaxed mb-8 font-medium italic opacity-90">"${profile.text}"</p>
                            
                            <div class="space-y-5 border-t border-white/10 pt-6">
                                ${results.map(r => `
                                    <div class="space-y-1.5">
                                        <div class="flex justify-between text-[10px] font-bold uppercase tracking-wider">
                                            <span class="opacity-40">${r.name}</span>
                                            <span class="${r.color.replace('text-', 'text-')}">${r.level}</span>
                                        </div>
                                        <div class="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                                            <div class="h-full ${r.bg}" style="width: ${(r.score/4)*100}%"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-orange-50 p-6 rounded-3xl border border-orange-100 space-y-3">
                            <h4 class="font-black text-xs uppercase text-orange-800 flex items-center gap-2">
                                <i data-lucide="zap" class="w-4 h-4"></i> Clave de Mejora
                            </h4>
                            <p class="text-xs text-orange-900 leading-relaxed font-bold">${profile.action}</p>
                        </div>

                        <button onclick="location.reload()" class="tap-active w-full bg-slate-900 text-white font-bold py-5 rounded-2xl mt-4 shadow-xl">Finalizar Evaluación</button>
                    </div>
                `;
            } else if (state.view === 'admin') {
                root.innerHTML = `
                    <div class="slide-up space-y-4">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-black">Histórico Staff</h2>
                            <button onclick="window.exportCSV()" class="bg-green-600 text-white p-2.5 rounded-xl shadow-lg">
                                <i data-lucide="download" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <div id="admin-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-1">
                            <p class="text-center py-20 text-slate-300 animate-pulse">Sincronizando con base de datos...</p>
                        </div>
                        <button onclick="window.go('home')" class="w-full py-4 text-slate-400 font-bold uppercase text-[10px] tracking-widest">Cerrar Sesión</button>
                    </div>
                `;
                window.loadData();
            }
            lucide.createIcons();
        };

        // Router & Actions
        window.go = (v) => { state.view = v; render(); };

        window.save = async (val) => {
            state.answers[ITEMS[state.currentIdx].id] = val;
            if (state.currentIdx < ITEMS.length - 1) {
                state.currentIdx++;
                render();
            } else {
                state.view = 'report';
                render();
                const scores = window.calculate(state.answers);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'responses'), {
                        createdAt: new Date().toISOString(),
                        scores: scores,
                        answers: state.answers
                    });
                } catch(e) { console.error(e); }
            }
        };

        window.calculate = (ans) => {
            const clean = {};
            ITEMS.forEach(it => clean[it.id] = it.inv ? (4 - ans[it.id]) : ans[it.id]);
            const groups = [
                { name: "Preparación", ids: [1,2,3,4,5] },
                { name: "Reactividad (CCR1)", ids: [6,7,8,10,16,18] },
                { name: "Disponibilidad (CCR2)", ids: [4,5,9,11,17,19] },
                { name: "Entrenador", ids: [12,13,14,15] }
            ];
            return groups.map(g => {
                const avg = g.ids.reduce((a, b) => a + clean[b], 0) / g.ids.length;
                let level = "Bajo", color = "text-red-500", bg = "bg-red-500";
                if (avg > 1.33) { level = "Medio"; color = "text-orange-500"; bg = "bg-orange-500"; }
                if (avg > 2.66) { level = "Alto"; color = "text-green-500"; bg = "bg-green-500"; }
                return { name: g.name, score: avg.toFixed(2), level, color, bg };
            });
        };

        window.interpret = (results) => {
            const r1 = parseFloat(results[1].score); // CCR1
            const r2 = parseFloat(results[2].score); // CCR2
            
            let text = "Perfil en maduración: Mantienes el equilibrio en muchos momentos, pero el error aún te genera un impacto que debemos aprender a soltar más rápido para seguir sumando.";
            let action = "Focalízate en tu rol defensivo justo después de un error; la acción física ayuda a borrar el pensamiento negativo.";

            if (r1 >= 2.67 && r2 >= 2.67) {
                text = "Perfil Resiliente: Gestionas el fallo como un dato técnico. Tu disponibilidad emocional tras el error es excelente, lo que te permite liderar al equipo en momentos tensos.";
                action = "Esa resiliencia es tu mayor talento. Sigue contagiando esa calma a tus compañeros cuando ellos fallen.";
            } else if (r1 < 1.34) {
                text = "Perfil Sensible al Error: El fallo te bloquea y te saca del partido emocionalmente. Sientes que el error te define y eso reduce tu intensidad en las siguientes acciones.";
                action = "Practica el 'vaciado mental' inmediato: una palmada o una respiración fuerte para decir 'la jugada terminó'.";
            }
            return { text, action };
        };

        window.loadData = async () => {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'responses'));
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center mb-2 shadow-sm text-[10px]">
                        <div>
                            <p class="font-black text-slate-800">${new Date(d.createdAt).toLocaleDateString()}</p>
                            <p class="text-slate-300 font-mono">${doc.id.slice(0,6)}</p>
                        </div>
                        <div class="flex gap-2 font-bold font-mono">
                            ${d.scores.map(s => `<span class="${s.color}">${s.score}</span>`).join('·')}
                        </div>
                    </div>`;
            });
        };

        window.exportCSV = async () => {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'responses'));
            let csv = "ID,Fecha,Prep,CCR1,CCR2,Staff\n";
            snap.forEach(doc => {
                const d = doc.data();
                csv += `${doc.id},${d.createdAt},${d.scores[0].score},${d.scores[1].score},${d.scores[2].score},${d.scores[3].score}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `cfeb_fap_export_${new Date().getTime()}.csv`; a.click();
        };

        // Firebase Auth Init
        onAuthStateChanged(auth, (u) => { 
            state.user = u; 
            if (!u) signInAnonymously(auth); 
            render(); 
        });

    </script>
</body>
</html>
