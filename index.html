<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFEB-FAP | Gestión del Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tap-active:active { transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app" class="min-h-screen flex flex-col max-w-lg mx-auto bg-white shadow-2xl border-x border-slate-100">
        <!-- Cabecera -->
        <header class="p-5 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-50">
            <div class="flex items-center gap-3">
                <div class="bg-orange-600 p-2 rounded-xl shadow-lg shadow-orange-100">
                    <i data-lucide="basketball" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg leading-none uppercase tracking-tight">CFEB-FAP</h1>
                    <p class="text-[9px] text-orange-600 font-black uppercase tracking-widest mt-1 italic">El fallo es aprendizaje</p>
                </div>
            </div>
            <div id="nav-btn" class="hidden">
                <button onclick="window.go('home')" class="p-2 text-slate-400 hover:text-slate-600">
                    <i data-lucide="home" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Contenido Principal -->
        <main id="main-view" class="flex-grow p-6 flex flex-col overflow-y-auto no-scrollbar"></main>

        <!-- Footer -->
        <footer class="p-6 text-center border-t border-slate-50 bg-slate-50/20">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] leading-relaxed">
                Protocolo Jorge Maroto Cuadrado<br>CB Estudiantes · 2026
            </p>
        </footer>
    </div>

    <script>
        // Configuración de Ítems (Basado en el PDF)
        const ITEMS = [
            { id: 1, text: "Antes del partido me siento preparado emocionalmente para competir", cat: "PREP" },
            { id: 2, text: "Antes de jugar pienso mucho en no cometer errores", cat: "PREP", inv: true },
            { id: 3, text: "Me siento nervioso o tenso antes de empezar el partido", cat: "PREP", inv: true },
            { id: 4, text: "Me siento con confianza para seguir jugando aunque falle", cat: "PREP" },
            { id: 5, text: "Me siento disponible para asumir responsabilidades en el juego", cat: "PREP" },
            { id: 6, text: "Cuando cometo un error, me bloqueo emocionalmente", cat: "CCR1", inv: true },
            { id: 7, text: "Después de fallar, tardo en volver a concentrarme", cat: "CCR1", inv: true },
            { id: 8, text: "Evito participar en la siguiente jugada tras un error", cat: "CCR1", inv: true },
            { id: 9, text: "Soy capaz de centrarme rápido en la siguiente acción", cat: "CCR2" },
            { id: 10, text: "El error baja mi intensidad defensiva", cat: "CCR1", inv: true },
            { id: 11, text: "Después de fallar, sigo disponible para recibir el balón", cat: "CCR2" },
            { id: 12, text: "Las indicaciones del entrenador me ayudan después de un error", cat: "STAFF" },
            { id: 13, text: "El feedback del entrenador reduce mi malestar cuando fallo", cat: "STAFF" },
            { id: 14, text: "A veces las indicaciones del entrenador me generan más presión", cat: "STAFF", inv: true },
            { id: 15, text: "Me siento apoyado por el entrenador cuando cometo errores", cat: "STAFF" },
            { id: 16, text: "Después del partido sigo dándole vueltas a mis errores", cat: "CCR1", inv: true },
            { id: 17, text: "Me resulta fácil soltar el partido a nivel emocional", cat: "CCR2" },
            { id: 18, text: "Los errores afectan a mi estado de ánimo después del partido", cat: "CCR1", inv: true },
            { id: 19, text: "Soy capaz de aprender de los errores sin machacarme", cat: "CCR2" }
        ];

        let state = {
            view: 'home',
            currentIdx: 0,
            answers: {},
            results: null
        };

        const render = () => {
            const root = document.getElementById('main-view');
            const navBtn = document.getElementById('nav-btn');
            root.innerHTML = '';
            navBtn.className = state.view === 'home' ? 'hidden' : 'block';

            if (state.view === 'home') {
                root.innerHTML = `
                    <div class="space-y-8 pt-10 slide-up text-center flex-grow flex flex-col justify-center">
                        <div class="bg-orange-50 w-28 h-28 rounded-full flex items-center justify-center mx-auto border-2 border-orange-100 shadow-inner">
                             <i data-lucide="brain-circuit" class="w-14 h-14 text-orange-600"></i>
                        </div>
                        <div class="space-y-3 px-4">
                            <h2 class="text-3xl font-black text-slate-900 tracking-tight leading-none uppercase italic">Análisis Funcional del Error</h2>
                            <p class="text-slate-400 text-sm font-medium">Test de autoinforme para jugadores de baloncesto sobre gestión emocional en pista.</p>
                        </div>
                        <div class="pt-6">
                            <button onclick="window.go('quiz')" class="tap-active w-full bg-slate-900 text-white font-extrabold py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 hover:bg-orange-600 transition-all">
                                Iniciar Test CFEB-FAP <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'quiz') {
                const item = ITEMS[state.currentIdx];
                const progress = (state.currentIdx / ITEMS.length) * 100;
                root.innerHTML = `
                    <div class="slide-up">
                        <div class="mb-10">
                            <div class="flex justify-between items-end mb-3">
                                <span class="text-[10px] font-black text-orange-600 uppercase tracking-widest">Pregunta ${state.currentIdx + 1} de 19</span>
                                <span class="text-xs font-bold text-slate-300">${Math.round(progress)}%</span>
                            </div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-orange-600 h-full transition-all duration-300" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <h3 class="text-2xl font-bold text-slate-800 mb-12 italic leading-tight">"${item.text}"</h3>
                        <div class="grid gap-3">
                            ${[
                                { v: 0, t: "Totalmente en desacuerdo" },
                                { v: 1, t: "En desacuerdo" },
                                { v: 2, t: "Neutral / A veces" },
                                { v: 3, t: "De acuerdo" },
                                { v: 4, t: "Totalmente de acuerdo" }
                            ].map(opt => `
                                <button onclick="window.save(${opt.v})" class="tap-active w-full p-5 rounded-2xl border-2 border-slate-100 bg-white text-left font-bold flex justify-between items-center hover:border-orange-500 hover:bg-orange-50 transition-all">
                                    <span class="text-slate-700">${opt.t}</span>
                                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-200"></i>
                                </button>
                            `).join('')}
                        </div>
                        <div class="mt-8">
                             <button onclick="window.prev()" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 ${state.currentIdx === 0 ? 'invisible' : ''}">
                                <i data-lucide="arrow-left" class="w-3 h-3"></i> Pregunta anterior
                             </button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'report') {
                const results = window.calculate(state.answers);
                const profile = window.interpret(results);
                root.innerHTML = `
                    <div class="slide-up space-y-6 pb-10">
                        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                            <div class="absolute -top-10 -right-10 w-40 h-40 bg-orange-600/10 rounded-full blur-3xl"></div>
                            <h4 class="text-orange-500 font-black text-[10px] uppercase tracking-widest mb-4">Perfil Interpretativo</h4>
                            <p class="text-xl leading-relaxed italic mb-8 font-medium">"${profile.text}"</p>
                            
                            <div class="space-y-5 pt-6 border-t border-white/10">
                                ${results.map(r => `
                                    <div class="space-y-1.5">
                                        <div class="flex justify-between items-center text-[10px] font-black uppercase">
                                            <span class="opacity-40 tracking-wider">${r.name}</span>
                                            <span class="${r.color}">${r.level} (${r.score})</span>
                                        </div>
                                        <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                            <div class="h-full ${r.bg}" style="width: ${(r.score/4)*100}%"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-orange-50 p-6 rounded-3xl border border-orange-100 flex gap-4">
                            <div class="bg-white p-2.5 rounded-xl h-fit border border-orange-200 shadow-sm text-orange-600">
                                <i data-lucide="zap" class="w-5 h-5"></i>
                            </div>
                            <div class="space-y-1 text-left">
                                <p class="text-[10px] font-black text-orange-800 uppercase tracking-widest">Recomendación Staff</p>
                                <p class="text-xs text-orange-950 font-bold leading-relaxed">${profile.action}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 pt-4">
                            <button onclick="window.go('home')" class="py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl text-sm">Cerrar</button>
                            <button onclick="window.printReport()" class="py-4 bg-slate-900 text-white font-bold rounded-2xl text-sm flex items-center justify-center gap-2 shadow-lg">
                                <i data-lucide="download" class="w-4 h-4"></i> Guardar PDF
                            </button>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        };

        window.go = (v) => { 
            state.view = v; 
            if(v === 'home') { state.currentIdx = 0; state.answers = {}; }
            render(); 
        };
        
        window.save = (v) => {
            state.answers[ITEMS[state.currentIdx].id] = v;
            if (state.currentIdx < ITEMS.length - 1) {
                state.currentIdx++; render();
            } else {
                state.view = 'report'; render();
            }
        };

        window.prev = () => {
            if (state.currentIdx > 0) {
                state.currentIdx--; render();
            }
        };

        window.calculate = (ans) => {
            const data = {};
            ITEMS.forEach(it => {
                const val = ans[it.id] !== undefined ? ans[it.id] : 0;
                data[it.id] = it.inv ? (4 - val) : val;
            });

            const groups = [
                { name: "Preparación", ids: [1,2,3,4,5] },
                { name: "Reactividad (CCR1)", ids: [6,7,8,10,16,18] },
                { name: "Disponibilidad (CCR2)", ids: [4,5,9,11,17,19] },
                { name: "Entrenador", ids: [12,13,14,15] }
            ];

            return groups.map(g => {
                const sum = g.ids.reduce((a, id) => a + data[id], 0);
                const avg = sum / g.ids.length;
                let level = "Bajo", color = "text-red-400", bg = "bg-red-500";
                if (avg >= 1.34) { level = "Medio"; color = "text-orange-400"; bg = "bg-orange-500"; }
                if (avg >= 2.67) { level = "Alto"; color = "text-green-400"; bg = "bg-green-500"; }
                return { name: g.name, score: avg.toFixed(2), level, color, bg };
            });
        };

        window.interpret = (res) => {
            const ccr1 = parseFloat(res[1].score);
            const ccr2 = parseFloat(res[2].score);
            
            if (ccr1 >= 2.67 && ccr2 >= 2.67) return { 
                text: "Muestras un perfil de alta resiliencia funcional. Consideras el fallo como una oportunidad de aprendizaje y tu disponibilidad emocional tras el error es excelente.", 
                action: "Tu capacidad para 'resetear' la mente ayuda a que el equipo no pierda fluidez. Sigue liderando con esa calma técnica." 
            };
            
            if (ccr1 < 1.34) return { 
                text: "El error tiende a bloquearte. Sientes que el fallo te define en el momento y eso te saca del partido emocionalmente, afectando a tu rendimiento posterior.", 
                action: "Tras un error, busca una acción física defensiva inmediata (un sprint o una ayuda). El cuerpo activado ayuda a limpiar la mente del fallo anterior." 
            };

            return { 
                text: "Perfil en equilibrio dinámico. El error te afecta, pero realizas un esfuerzo consciente por seguir pidiendo el balón y participando en el juego.", 
                action: "Utiliza las indicaciones del staff como guía técnica rápida para volver a concentrarte en la tarea presente." 
            };
        };

        window.printReport = () => {
            window.print();
        };

        // Iniciar
        render();

    </script>
</body>
</html>
