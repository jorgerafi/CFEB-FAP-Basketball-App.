<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFEB-FAP | Sistema de Resiliencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        window.FB = { initializeApp, getFirestore, collection, addDoc, getDocs, doc, setDoc, getAuth, signInAnonymously };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURACIÓN DE SEGURIDAD ---
        // DEBES RELLENAR ESTOS DATOS DESDE TU PANEL DE FIREBASE
        const manualConfig = {
            apiKey: "TU_API_KEY_AQUÍ",
            authDomain: "tu-proyecto.firebaseapp.com",
            projectId: "tu-proyecto-id",
            storageBucket: "tu-proyecto.appspot.com",
            messagingSenderId: "tu-sender-id",
            appId: "tu-app-id"
        };

        const getFirebaseConfig = () => {
            if (typeof window.__firebase_config !== 'undefined' && window.__firebase_config) {
                try { return JSON.parse(window.__firebase_config); } catch (e) { console.error("Error parseando __firebase_config"); }
            }
            return manualConfig;
        };

        const firebaseConfig = getFirebaseConfig();
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'cfeb-fap-v1';

        // --- PREGUNTAS ---
        const QUESTIONS = [
            { id: 1, text: "Antes del partido me siento preparado emocionalmente para competir", section: "ANTES", inverted: false },
            { id: 2, text: "Antes de jugar pienso mucho en no cometer errores", section: "ANTES", inverted: true },
            { id: 3, text: "Me siento nervioso o tenso antes de empezar el partido", section: "ANTES", inverted: true },
            { id: 4, text: "Me siento con confianza para seguir jugando aunque falle", section: "ANTES", inverted: false },
            { id: 5, text: "Me siento disponible para asumir responsabilidades en el juego", section: "ANTES", inverted: false },
            { id: 6, text: "Cuando cometo un error, me bloqueo emocionalmente", section: "DURANTE", inverted: true },
            { id: 7, text: "Después de fallar, tardo en volver a concentrarme", section: "DURANTE", inverted: true },
            { id: 8, text: "Evito participar en la siguiente jugada tras un error", section: "DURANTE", inverted: true },
            { id: 9, text: "Soy capaz de centrarme rápido en la siguiente acción", section: "DURANTE", inverted: false },
            { id: 10, text: "El error baja mi intensidad defensiva", section: "DURANTE", inverted: true },
            { id: 11, text: "Después de fallar, sigo disponible para recibir el balón", section: "DURANTE", inverted: false },
            { id: 12, text: "Las indicaciones del entrenador me ayudan después de un error", section: "ENTRENADOR", inverted: false },
            { id: 13, text: "El feedback del entrenador reduce mi malestar cuando fallo", section: "ENTRENADOR", inverted: false },
            { id: 14, text: "A veces las indicaciones del entrenador me generan más presión", section: "ENTRENADOR", inverted: true },
            { id: 15, text: "Me siento apoyado por el entrenador cuando cometo errores", section: "ENTRENADOR", inverted: false },
            { id: 16, text: "Después del partido sigo dándole vueltas a mis errores", section: "DESPUÉS", inverted: true },
            { id: 17, text: "Me resulta fácil soltar el partido a nivel emocional", section: "DESPUÉS", inverted: false },
            { id: 18, text: "Los errores afectan a mi estado de ánimo después del partido", section: "DESPUÉS", inverted: true },
            { id: 19, text: "Soy capaz de aprender de los errores sin machacarme", section: "DESPUÉS", inverted: false },
        ];

        const SCALES = {
            PREPARACION: { name: "Preparación Pre-partido", items: [1, 2, 3, 4, 5] },
            REACTIVIDAD: { name: "Reactividad al Error (CCR1)", items: [6, 7, 8, 10, 16, 18] },
            DISPONIBILIDAD: { name: "Disponibilidad Post-error (CCR2)", items: [4, 5, 9, 11, 17, 19] },
            ENTRENADOR: { name: "Apoyo del Entrenador", items: [12, 13, 14, 15] },
        };

        function App() {
            const [view, setView] = React.useState('welcome');
            const [currentStep, setCurrentStep] = React.useState(0);
            const [answers, setAnswers] = React.useState({});
            const [db, setDb] = React.useState(null);
            const [user, setUser] = React.useState(null);
            const [adminData, setAdminData] = React.useState([]);
            const [adminPass, setAdminPass] = React.useState("");
            const [errorMsg, setErrorMsg] = React.useState(null);
            const [loading, setLoading] = React.useState(false);

            React.useEffect(() => {
                const startFirebase = async () => {
                    if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("TU_API_KEY")) {
                        setErrorMsg("Falta configurar la API Key de Firebase en el código.");
                        return;
                    }
                    try {
                        const app = FB.initializeApp(firebaseConfig);
                        const _auth = FB.getAuth(app);
                        const _db = FB.getFirestore(app);
                        
                        // Esperar login antes de nada
                        const cred = await FB.signInAnonymously(_auth);
                        setUser(cred.user);
                        setDb(_db);
                        console.log("Firebase conectado como:", cred.user.uid);
                    } catch (e) {
                        console.error("Fallo de conexión:", e);
                        setErrorMsg("Error de red: No se pudo conectar con Firebase. Revisa la consola (F12).");
                    }
                };
                startFirebase();
            }, []);

            const calculateResults = (ans) => {
                const res = {};
                Object.keys(SCALES).forEach(key => {
                    const items = SCALES[key].items;
                    const scores = items.map(id => {
                        const q = QUESTIONS.find(q => q.id === id);
                        return q.inverted ? 4 - ans[id] : ans[id];
                    });
                    res[key] = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(2);
                });
                return res;
            };

            const saveAndShow = async () => {
                setLoading(true);
                const results = calculateResults(answers);
                if (db && user) {
                    try {
                        // RUTA ESTRICTA SEGÚN PROTOCOLO
                        const colRef = FB.collection(db, 'artifacts', appId, 'public', 'data', 'responses');
                        await FB.addDoc(colRef, {
                            userId: user.uid,
                            timestamp: new Date().toISOString(),
                            results
                        });
                        setView('results');
                    } catch (e) {
                        console.error("Error al guardar:", e);
                        setErrorMsg("Error al guardar datos. ¿Están activadas las reglas de Firestore?");
                        setView('results'); // Permitir ver resultados locales aunque falle nube
                    }
                } else {
                    setView('results');
                }
                setLoading(false);
            };

            const accessAdmin = async () => {
                if (adminPass !== "CFEB2026") return alert("Acceso denegado");
                if (!db) return alert("Base de datos no disponible.");
                
                setLoading(true);
                try {
                    const colRef = FB.collection(db, 'artifacts', appId, 'public', 'data', 'responses');
                    const snapshot = await FB.getDocs(colRef);
                    setAdminData(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setView('admin');
                } catch (e) {
                    console.error("Error admin:", e);
                    alert("No se pudieron cargar los datos. Revisa permisos de Firestore.");
                }
                setLoading(false);
            };

            if (view === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="bg-white max-w-sm w-full rounded-[2.5rem] p-10 shadow-2xl border border-slate-100 text-center">
                        {errorMsg && <div className="mb-4 p-3 bg-red-50 text-red-600 text-[10px] font-bold uppercase rounded-xl">{errorMsg}</div>}
                        <h1 className="text-3xl font-black mb-2 italic tracking-tighter">CFEB-FAP</h1>
                        <p className="text-slate-400 text-sm mb-8">Gestión del error en el deporte.</p>
                        <button onClick={() => setView('survey')} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:scale-[1.02] transition-all shadow-lg shadow-slate-200">Empezar Test</button>
                        
                        <div className="mt-12 pt-8 border-t border-slate-50">
                            <input type="password" placeholder="Staff Pass" className="w-full bg-slate-100 p-4 rounded-xl text-center text-sm outline-none mb-2" onChange={e => setAdminPass(e.target.value)} />
                            <button onClick={accessAdmin} className="text-[10px] font-black uppercase text-slate-300 hover:text-slate-900 tracking-widest">{loading ? "Cargando..." : "Panel Admin"}</button>
                        </div>
                    </div>
                </div>
            );

            if (view === 'survey') {
                const q = QUESTIONS[currentStep];
                return (
                    <div className="min-h-screen bg-white p-6 flex flex-col items-center justify-center">
                        <div className="max-w-md w-full">
                            <p className="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-2">{q.section} • {currentStep+1}/{QUESTIONS.length}</p>
                            <h2 className="text-2xl font-bold text-slate-900 mb-12 leading-snug">{q.text}</h2>
                            <div className="flex justify-between mb-2">
                                {[0,1,2,3,4].map(v => (
                                    <button key={v} onClick={() => setAnswers({...answers, [q.id]: v})} className={`w-14 h-14 rounded-2xl border-2 font-black transition-all ${answers[q.id] === v ? 'bg-orange-500 border-orange-500 text-white scale-110' : 'border-slate-50 text-slate-200 hover:border-slate-100'}`}>{v}</button>
                                ))}
                            </div>
                            <div className="flex justify-between text-[10px] font-bold text-slate-300 uppercase px-1 mb-20"><span>Nunca</span><span>Siempre</span></div>
                            <div className="flex gap-4">
                                <button onClick={() => setCurrentStep(Math.max(0, currentStep-1))} className="p-5 bg-slate-50 rounded-2xl text-slate-400">←</button>
                                {currentStep < QUESTIONS.length - 1 ? (
                                    <button disabled={answers[q.id] === undefined} onClick={() => setCurrentStep(currentStep+1)} className="flex-1 bg-slate-900 text-white font-bold rounded-2xl disabled:opacity-20 shadow-lg">Siguiente</button>
                                ) : (
                                    <button disabled={loading || answers[q.id] === undefined} onClick={saveAndShow} className="flex-1 bg-orange-600 text-white font-bold rounded-2xl shadow-lg">{loading ? "Enviando..." : "Finalizar"}</button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'results') {
                const results = calculateResults(answers);
                return (
                    <div className="min-h-screen p-6 flex flex-col items-center justify-center bg-slate-50">
                        <div className="bg-white max-w-md w-full rounded-[2.5rem] p-10 shadow-xl">
                            <h2 className="text-2xl font-black mb-8 italic tracking-tighter">Tu Perfil</h2>
                            <div className="space-y-6 mb-10">
                                {Object.keys(SCALES).map(k => (
                                    <div key={k}>
                                        <div className="flex justify-between text-[10px] font-black uppercase text-slate-400 mb-1"><span>{SCALES[k].name}</span><span>{results[k]}</span></div>
                                        <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className="bg-slate-900 h-full" style={{width: `${(results[k]/4)*100}%`}}></div></div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold">Volver</button>
                        </div>
                    </div>
                );
            }

            if (view === 'admin') return (
                <div className="min-h-screen p-6 bg-slate-50">
                    <div className="max-w-4xl mx-auto bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                        <div className="p-8 border-b border-slate-50 flex justify-between items-center">
                            <h2 className="text-xl font-black italic">Datos de Jugadores</h2>
                            <button onClick={() => setView('welcome')} className="text-xs font-bold text-slate-400 uppercase">Salir</button>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-xs">
                                <thead>
                                    <tr className="bg-slate-50 text-slate-400 font-black uppercase border-b">
                                        <th className="p-5">ID Corto</th>
                                        <th className="p-5">Fecha</th>
                                        <th className="p-5">CCR1 (Error)</th>
                                        <th className="p-5">CCR2 (Disponibilidad)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {adminData.map(d => (
                                        <tr key={d.id} className="border-b border-slate-50 hover:bg-slate-50">
                                            <td className="p-5 font-mono">...{d.userId?.slice(-4)}</td>
                                            <td className="p-5">{new Date(d.timestamp).toLocaleDateString()}</td>
                                            <td className="p-5 font-bold text-slate-900">{d.results?.REACTIVIDAD}</td>
                                            <td className="p-5 font-bold text-slate-900">{d.results?.DISPONIBILIDAD}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
